<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Řetězová reakce</title>

<style>
body {
    margin: 0;
    background: #0a0a1a;
    color: white;
    font-family: Arial;
    text-align: center;
}

canvas {
    display: block;
    margin: auto;
}

.controls {
    margin: 10px;
}

button {
    padding: 10px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>⚛️ Neřízená řetězová reakce</h1>

<canvas id="canvas" width="1200" height="500"></canvas>

<div class="controls">
    <button onclick="paused = !paused">Pause</button>
    <button onclick="speed*=1.3">Speed +</button>
    <button onclick="speed*=0.7">Speed -</button>
    <button onclick="reset()">Reset</button>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let atoms, neutrons, flashes, fragments;
let paused = false;
let speed = 1;
let detected = 0;

const detectorX = 1140;

class Atom {
    constructor(x,y){
        this.x=x; this.y=y; this.active=true;
    }
}

class Neutron {
    constructor(x,y,vx,vy){
        this.x=x; this.y=y;
        this.vx=vx; this.vy=vy;
        this.trail=[];
    }
}

class Flash {
    constructor(x,y){
        this.x=x; this.y=y; this.life=15;
    }
}

class Fragment {
    constructor(x,y){
        this.x=x; this.y=y;
        let a=Math.random()*Math.PI*2;
        let s=Math.random()*1.5;
        this.vx=Math.cos(a)*s;
        this.vy=Math.sin(a)*s;
        this.life=100;
    }
    update(){
        this.x+=this.vx*speed;
        this.y+=this.vy*speed;
        this.vx*=0.97;
        this.vy*=0.97;
        this.life--;
    }
}

function createAtoms(){
    let arr=[];
    let startX=200;
    for(let col=0; col<7; col++){
        let count=Math.floor(Math.pow(2.5,col));
        let x=startX+col*75;
        for(let i=0;i<count;i++){
            let y=250+(i-(count-1)/2)*40;
            if(y>0 && y<500) arr.push(new Atom(x,y));
        }
    }
    return arr;
}

function reset(){
    atoms=createAtoms();
    neutrons=[new Neutron(80,250,4,0)];
    flashes=[];
    fragments=[];
    detected=0;
    speed=1;
}

reset();

function update(){

    for(let f of fragments) f.update();
    fragments=fragments.filter(f=>f.life>0);

    let newNeutrons=[];

    for(let n of neutrons){

        n.x+=n.vx*speed;
        n.y+=n.vy*speed;

        n.trail.push([n.x,n.y]);
        if(n.trail.length>5) n.trail.shift();

        if(n.x>=detectorX){
            detected++;
            continue;
        }

        let hit=false;

        for(let atom of atoms){
            if(atom.active){
                let dx=n.x-atom.x;
                let dy=n.y-atom.y;
                if(Math.sqrt(dx*dx+dy*dy)<12){
                    atom.active=false;

                    flashes.push(new Flash(atom.x,atom.y));
                    fragments.push(new Fragment(atom.x,atom.y));
                    fragments.push(new Fragment(atom.x,atom.y));

                    for(let i=0;i<3;i++){
                        let angle=(Math.random()-0.5)*1.2;
                        newNeutrons.push(new Neutron(atom.x,atom.y,4,angle*4));
                    }
                    hit=true;
                    break;
                }
            }
        }

        if(!hit && n.x<1200 && n.y>0 && n.y<500){
            newNeutrons.push(n);
        }
    }

    neutrons=newNeutrons;

    flashes.forEach(f=>f.life--);
    flashes=flashes.filter(f=>f.life>0);
}

function draw(){

    ctx.fillStyle="#0a0a1a";
    ctx.fillRect(0,0,1200,500);

    // detektor
    ctx.fillStyle="#143c2f";
    ctx.fillRect(detectorX,0,60,500);
    ctx.fillStyle="lime";
    ctx.fillRect(detectorX,0,5,500);

    // fragmenty
    ctx.fillStyle="brown";
    for(let f of fragments){
        ctx.beginPath();
        ctx.arc(f.x,f.y,5,0,Math.PI*2);
        ctx.fill();
    }

    // atomy
    for(let atom of atoms){
        if(atom.active){
            ctx.fillStyle="lightblue";
            ctx.beginPath();
            ctx.arc(atom.x,atom.y,8,0,Math.PI*2);
            ctx.fill();
        }
    }

    // neutrony + trail
    for(let n of neutrons){

        ctx.strokeStyle="rgba(255,255,0,0.3)";
        ctx.beginPath();
        for(let i=0;i<n.trail.length;i++){
            let p=n.trail[i];
            if(i===0) ctx.moveTo(p[0],p[1]);
            else ctx.lineTo(p[0],p[1]);
        }
        ctx.stroke();

        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(n.x,n.y,3,0,Math.PI*2);
        ctx.fill();
    }

    // flashes
    ctx.strokeStyle="orange";
    for(let f of flashes){
        ctx.beginPath();
        ctx.arc(f.x,f.y,(15-f.life)*6,0,Math.PI*2);
        ctx.stroke();
    }

    // text
    ctx.fillStyle="white";
    ctx.fillText("Neutrony: "+neutrons.length+" | Zachyceno: "+detected,20,20);
    ctx.fillText("Rychlost: x"+speed.toFixed(2),20,40);
    if(paused) ctx.fillText("PAUZA",20,60);
}

function loop(){
    if(!paused) update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
