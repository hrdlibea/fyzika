<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Řízená reakce</title>

<style>
body {
    margin: 0;
    background: #141420;
    color: white;
    font-family: Arial;
    text-align: center;
}

canvas {
    display: block;
    margin: auto;
}

button {
    margin: 5px;
    padding: 10px;
}
</style>
</head>

<body>

<h1>⚛️ Řízená štěpná reakce</h1>

<canvas id="canvas" width="1200" height="520"></canvas>

<div>
<button onclick="paused=!paused">Pause</button>
<button onclick="reset()">Reset</button>
<button onclick="speed*=1.2">Speed +</button>
<button onclick="speed*=0.8">Speed -</button>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let atoms, neutrons, flashes, fragments;
let paused=false;
let speed=1;
let detected=0;

const FISSION_PROB=0.7;
const detectorX=1150;
const rodX=1050;
const holeSize=160;

class Atom{
    constructor(x,y){
        this.x=x; this.y=y; this.fissioned=false;
    }
}

class Neutron{
    constructor(x,y,vx,vy){
        this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    }
}

class Fragment{
    constructor(x,y){
        this.x=x; this.y=y;
        let a=Math.random()*Math.PI*2;
        let s=Math.random()*2;
        this.vx=Math.cos(a)*s;
        this.vy=Math.sin(a)*s;
        this.life=100;
    }
    update(){
        this.x+=this.vx*speed;
        this.y+=this.vy*speed;
        this.vx*=0.95;
        this.vy*=0.95;
        this.life--;
    }
}

class Flash{
    constructor(x,y){
        this.x=x; this.y=y; this.life=12;
    }
}

function createAtoms(){
    let arr=[];
    let startX=350;
    for(let col=0; col<5; col++){
        let count=Math.pow(2,col);
        let x=startX+col*120;
        for(let i=0;i<count;i++){
            let y=260+(i-(count-1)/2)*45;
            arr.push(new Atom(x,y));
        }
    }
    return arr;
}

function reset(){
    atoms=createAtoms();
    neutrons=[new Neutron(80,260,4,0)];
    flashes=[];
    fragments=[];
    detected=0;
    speed=1;
}

reset();

function update(){

    fragments.forEach(f=>f.update());
    fragments=fragments.filter(f=>f.life>0);

    let newNeutrons=[];

    for(let n of neutrons){

        n.x+=n.vx*speed;
        n.y+=n.vy*speed;

        // moderátor
        if((200<n.x && n.x<280)||(500<n.x&&n.x<580)||(800<n.x&&n.x<880)){
            n.vx*=0.98;
            n.vy*=0.98;
        }

        if(n.x>detectorX){
            detected++;
            continue;
        }

        // tyče
        if(n.x>rodX){
            if(!(260-holeSize/2 < n.y && n.y < 260+holeSize/2)){
                continue;
            }
        }

        let hit=false;

        for(let atom of atoms){
            if(!atom.fissioned){
                let dx=n.x-atom.x;
                let dy=n.y-atom.y;
                if(Math.sqrt(dx*dx+dy*dy)<18){

                    if(Math.random()<FISSION_PROB){
                        atom.fissioned=true;
                        flashes.push(new Flash(atom.x,atom.y));

                        for(let i=0;i<2;i++){
                            fragments.push(new Fragment(atom.x,atom.y));
                        }

                        let count=Math.floor(Math.random()*2)+2;
                        for(let i=0;i<count;i++){
                            let a=(Math.random()-0.5)*1.6;
                            newNeutrons.push(new Neutron(atom.x,atom.y,4,a*4));
                        }

                    } else {
                        newNeutrons.push(n);
                    }

                    hit=true;
                    break;
                }
            }
        }

        if(!hit && n.x<1200){
            newNeutrons.push(n);
        }
    }

    neutrons=newNeutrons;

    flashes.forEach(f=>f.life--);
    flashes=flashes.filter(f=>f.life>0);
}

function draw(){

    ctx.fillStyle="#141420";
    ctx.fillRect(0,0,1200,520);

    // moderátor
    ctx.fillStyle="rgba(200,220,255,0.2)";
    ctx.fillRect(200,0,80,520);
    ctx.fillRect(500,0,80,520);
    ctx.fillRect(800,0,80,520);

    // tyče
    ctx.fillStyle="gray";
    ctx.fillRect(rodX,0,40,260-holeSize/2);
    ctx.fillRect(rodX,260+holeSize/2,40,520);

    // detektor
    ctx.fillStyle="green";
    ctx.fillRect(detectorX,0,30,520);

    // fragmenty
    ctx.fillStyle="orange";
    fragments.forEach(f=>{
        ctx.beginPath();
        ctx.arc(f.x,f.y,5,0,Math.PI*2);
        ctx.fill();
    });

    // atomy
    atoms.forEach(a=>{
        if(!a.fissioned){
            ctx.fillStyle="lightblue";
            ctx.beginPath();
            ctx.arc(a.x,a.y,12,0,Math.PI*2);
            ctx.fill();
        }
    });

    // neutrony
    ctx.fillStyle="red";
    neutrons.forEach(n=>{
        ctx.beginPath();
        ctx.arc(n.x,n.y,4,0,Math.PI*2);
        ctx.fill();
    });

    // flash
    ctx.strokeStyle="yellow";
    flashes.forEach(f=>{
        ctx.beginPath();
        ctx.arc(f.x,f.y,(12-f.life)*8,0,Math.PI*2);
        ctx.stroke();
    });

    ctx.fillStyle="white";
    ctx.fillText("Neutrony: "+neutrons.length+" | Zachyceno: "+detected,20,20);
    if(paused) ctx.fillText("PAUZA",20,40);
}

function loop(){
    if(!paused) update();
    draw();
    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
